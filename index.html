<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>위대한 AI님의 맛집 가이드</title>
<meta name="description" content="일본 525곳 · 별내 근처 200곳 — AI가 큐레이션한 맛집 가이드 모음">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%B6%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090806;
    --bg-2: #0e0c09;
    --surface: #131009;
    --surface-2: #19150c;
    --line: rgba(220, 185, 130, 0.10);
    --line-strong: rgba(220, 185, 130, 0.22);
    --text: #ece2d0;
    --text-dim: #c6b99e;
    --text-faint: #9a8d73;
    --accent: #e0a445;
    --accent-bright: #f5c069;
    --accent-ink: #120d05;
    --jp: #d34a3a;
    --jp-glow: #f0785f;
    --kr: #8fae6b;
    --kr-glow: #b6d38c;
    --shadow: 0 16px 40px -18px rgba(0,0,0,0.85);
    --shadow-lift: 0 40px 80px -28px rgba(0,0,0,0.9);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  :root[data-theme="light"] {
    --bg: #f7f0e2;
    --bg-2: #f1e8d5;
    --surface: #fffbf3;
    --surface-2: #f4ead4;
    --line: rgba(90, 60, 20, 0.14);
    --line-strong: rgba(90, 60, 20, 0.26);
    --text: #2b2013;
    --text-dim: #5c4d38;
    --text-faint: #8a7a5e;
    --accent: #b96f1e;
    --accent-bright: #8f5414;
    --accent-ink: #fffaf0;
    --jp: #c23c2d;
    --jp-glow: #d34a3a;
    --kr: #4f7a34;
    --kr-glow: #4f7a34;
    --shadow: 0 12px 28px -18px rgba(60,40,10,0.35);
    --shadow-lift: 0 30px 60px -24px rgba(60,40,10,0.4);
  }

  * { box-sizing: border-box; }

  @media (prefers-reduced-motion: no-preference) {
    html { scroll-behavior: smooth; }
  }

  html, body { margin: 0; min-height: 100%; }

  body {
    background:
      radial-gradient(1200px 600px at 12% -12%, color-mix(in srgb, var(--accent) 12%, transparent), transparent),
      radial-gradient(1000px 500px at 100% 110%, color-mix(in srgb, var(--jp) 8%, transparent), transparent),
      var(--bg);
    color: var(--text);
    font-family: "Zen Kaku Gothic New", -apple-system, "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    word-break: keep-all;
    overflow-wrap: break-word;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  a { color: var(--accent-bright); text-decoration: none; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px clamp(20px, 5vw, 56px);
    max-width: 1180px; width: 100%; margin: 0 auto;
  }
  .brandmark {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: .02em; color: var(--text-dim);
    font-size: 14px;
  }
  .brandmark .dot { color: var(--accent); font-size: 18px; line-height: 1; }

  .theme-toggle {
    background: var(--surface); border: 1px solid var(--line);
    color: var(--text-dim); border-radius: 999px;
    width: 40px; height: 40px; cursor: pointer; font-size: 17px;
    display: grid; place-items: center;
    transition: border-color .25s, transform .25s var(--ease-spring), background .25s;
  }
  .theme-toggle:hover { border-color: var(--line-strong); transform: scale(1.08); }
  .theme-toggle:active { transform: scale(.94); }

  /* ---- hero ---- */
  .hero {
    max-width: 1180px; width: 100%; margin: 0 auto;
    padding: clamp(24px, 6vw, 60px) clamp(20px, 5vw, 56px) clamp(18px, 3vw, 34px);
    text-align: center;
  }
  .eyebrow {
    font-size: 12.5px; letter-spacing: .34em; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin: 0 0 18px;
  }
  .hero h1 {
    font-weight: 900; letter-spacing: -.02em; line-height: 1.08;
    font-size: clamp(34px, 6.4vw, 68px); margin: 0;
    background: linear-gradient(150deg, var(--text) 30%, var(--accent-bright));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero h1 .name { color: var(--accent); -webkit-text-fill-color: var(--accent); }
  .hero p.sub {
    color: var(--text-dim); font-size: clamp(14px, 1.9vw, 18px);
    max-width: 560px; margin: 20px auto 0;
  }
  .stat-strip {
    display: flex; justify-content: center; gap: clamp(20px, 5vw, 52px);
    margin-top: 34px; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat b {
    display: block; font-weight: 900; letter-spacing: -.02em;
    font-size: clamp(24px, 4vw, 38px); color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .stat span { font-size: 12px; color: var(--text-faint); letter-spacing: .08em; }
  .stat .sep { color: var(--line-strong); }

  /* ---- cards ---- */
  .grid {
    max-width: 1180px; width: 100%; margin: 0 auto;
    padding: clamp(14px, 3vw, 30px) clamp(20px, 5vw, 56px) 40px;
    display: grid; gap: clamp(18px, 2.6vw, 28px);
    grid-template-columns: repeat(2, 1fr);
    flex: 1;
  }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }

  .card {
    position: relative; display: flex; flex-direction: column;
    border: 1px solid var(--line); border-radius: 22px;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    overflow: hidden; text-decoration: none; color: inherit;
    box-shadow: var(--shadow);
    transition: transform .5s var(--ease-out), box-shadow .5s var(--ease-out), border-color .5s;
    isolation: isolate;
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-8px);
    box-shadow: var(--shadow-lift);
    border-color: var(--line-strong);
    outline: none;
  }
  .card:focus-visible { border-color: var(--accent); }

  .cover {
    position: relative; height: clamp(150px, 22vw, 210px);
    display: grid; place-items: center; overflow: hidden;
  }
  .card .cover .emoji {
    font-size: clamp(66px, 11vw, 104px); line-height: 1;
    filter: drop-shadow(0 10px 24px rgba(0,0,0,.5));
    transition: transform .6s var(--ease-spring);
  }
  .card:hover .cover .emoji { transform: scale(1.12) rotate(-4deg); }

  /* real media cover (video / image) */
  .card .cover .media {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0; background: #0b0806;
    transition: transform .6s var(--ease-spring);
  }
  .card:hover .cover .media { transform: scale(1.06); }
  .card .cover::after {
    content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,.12) 0%, transparent 42%, rgba(0,0,0,.42));
  }
  .card .cover .flag { z-index: 2; }

  .card.jp .cover { background:
      radial-gradient(120% 120% at 50% 120%, color-mix(in srgb, var(--jp-glow) 42%, transparent), transparent 70%),
      linear-gradient(160deg, #2a1512, #140b0a); }
  .card.kr .cover { background:
      radial-gradient(120% 120% at 50% 120%, color-mix(in srgb, var(--kr-glow) 38%, transparent), transparent 70%),
      linear-gradient(160deg, #17200f, #0d1108); }
  :root[data-theme="light"] .card.jp .cover { background:
      radial-gradient(120% 120% at 50% 120%, color-mix(in srgb, var(--jp-glow) 30%, transparent), transparent 72%),
      linear-gradient(160deg, #f6ddd6, #efd7ce); }
  :root[data-theme="light"] .card.kr .cover { background:
      radial-gradient(120% 120% at 50% 120%, color-mix(in srgb, var(--kr-glow) 34%, transparent), transparent 72%),
      linear-gradient(160deg, #e5ecd8, #dde6cc); }

  .flag {
    position: absolute; top: 14px; left: 16px;
    font-size: 12px; letter-spacing: .12em; font-weight: 700;
    padding: 5px 11px; border-radius: 999px;
    background: rgba(0,0,0,.35); color: #fff; backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.14);
  }
  :root[data-theme="light"] .flag { background: rgba(255,255,255,.55); color: var(--text); border-color: var(--line-strong); }

  .card .body { padding: 22px clamp(20px, 2.6vw, 28px) 26px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .card h2 { margin: 0; font-weight: 900; letter-spacing: -.01em; font-size: clamp(20px, 2.6vw, 26px); }
  .card .desc { margin: 0; color: var(--text-dim); font-size: 14.5px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
  .chip {
    font-size: 12px; font-weight: 600; letter-spacing: .01em;
    padding: 5px 11px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    color: var(--text-dim); font-variant-numeric: tabular-nums;
  }
  .chip b { color: var(--accent-bright); font-weight: 800; }

  .go {
    display: flex; align-items: center; gap: 8px; margin-top: 16px;
    font-weight: 800; color: var(--accent-bright); font-size: 14.5px;
  }
  .go .arrow { transition: transform .4s var(--ease-spring); }
  .card:hover .go .arrow { transform: translateX(6px); }

  /* ---- footer ---- */
  footer {
    max-width: 1180px; width: 100%; margin: 0 auto;
    padding: 22px clamp(20px, 5vw, 56px) 34px;
    color: var(--text-faint); font-size: 12.5px;
    display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    border-top: 1px solid var(--line);
  }

  /* ---- entrance ---- */
  @media (prefers-reduced-motion: no-preference) {
    .reveal { opacity: 0; transform: translateY(18px); animation: rise .8s var(--ease-out) forwards; }
    .d1 { animation-delay: .05s; } .d2 { animation-delay: .14s; }
    .d3 { animation-delay: .24s; } .d4 { animation-delay: .34s; }
    @keyframes rise { to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brandmark"><span class="dot">🍶</span> 맛집 가이드</div>
    <button class="theme-toggle" id="themeToggle" aria-label="테마 전환" title="라이트/다크">🌙</button>
  </header>

  <section class="hero">
    <p class="eyebrow reveal d1">국내 · 해외</p>
    <h1 class="reveal d1">위대한 AI님의<br>맛집 조사자료</h1>
    <p class="sub reveal d2">평점·리뷰 다 뒤져서 정리한 국내·해외 맛집 데이터. 카드 눌러 들어가면 됨.</p>
    <div class="stat-strip reveal d2">
      <div class="stat"><b>725</b><span>총 맛집</span></div>
      <div class="stat sep" aria-hidden="true"><b>·</b><span>&nbsp;</span></div>
      <div class="stat"><b>2</b><span>가이드</span></div>
    </div>
  </section>

  <main class="grid">
    <a class="card jp reveal d3" href="japan-food-guide/">
      <div class="cover">
        <span class="flag">🌏 해외 · 일본</span>
        <video class="media" src="japan-food-guide/anime/Masters%20Dream%20Intro_ver3.mp4"
               autoplay muted loop playsinline preload="metadata" aria-hidden="true"></video>
      </div>
      <div class="body">
        <h2>일본 맛집 가이드</h2>
        <p class="desc">도시별 큐레이션. 라멘 · 스시 · 피자, 9개 버킷.</p>
        <div class="chips">
          <span class="chip"><b>525</b>곳</span>
          <span class="chip"><b>5</b>개 도시</span>
          <span class="chip"><b>9</b>개 버킷</span>
        </div>
        <span class="go">가이드 열기 <span class="arrow">→</span></span>
      </div>
    </a>

    <a class="card kr reveal d4" href="korea-bar-guide/">
      <div class="cover">
        <span class="flag">🇰🇷 국내 · 별내·갈매</span>
        <img class="media" src="https://ldb-phinf.pstatic.net/20231204_92/1701700055317sF2vi_JPEG/231204_%BE%C6%BE%BE%B3%D7_%C1%B7%B9%DF_0.jpg?type=w500_60_sharpen"
             alt="아씨네족발 화덕족발" loading="lazy" referrerpolicy="no-referrer">
      </div>
      <div class="body">
        <h2>별내 근처 맛집</h2>
        <p class="desc">별내·갈매 동네 맛집. 2구역 지도와 오늘의 픽.</p>
        <div class="chips">
          <span class="chip"><b>200</b>곳</span>
          <span class="chip">별내 <b>135</b></span>
          <span class="chip">갈매 <b>65</b></span>
        </div>
        <span class="go">가이드 열기 <span class="arrow">→</span></span>
      </div>
    </a>
  </main>

  <footer>
    <span>🍶 위대한 AI님의 맛집 가이드</span>
    <span>가이드 더 생기면 여기 카드로 붙음</span>
  </footer>

<script>
  (function () {
    var root = document.documentElement;
    var btn = document.getElementById('themeToggle');
    var saved = null;
    try { saved = localStorage.getItem('theme'); } catch (e) {}
    if (saved) root.setAttribute('data-theme', saved);
    function sync() { btn.textContent = root.getAttribute('data-theme') === 'light' ? '☀️' : '🌙'; }
    sync();
    btn.addEventListener('click', function () {
      var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
      sync();
    });
  })();
</script>
</body>
</html>
